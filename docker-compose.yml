# Scaling-path stub. For local dev, run `uvicorn` directly (see README).
# This compose file documents the seam for adding Postgres and a
# Redis-backed worker queue later.
services:
  api:
    build:
      context: .
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    volumes:
      - ./data:/app/data

